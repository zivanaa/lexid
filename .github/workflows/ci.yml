name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install deps (lean — no embedding extras, no model downloads)
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check . && uv run ruff format --check .
      - name: Tests (no network, no paid APIs)
        run: uv run pytest -q
